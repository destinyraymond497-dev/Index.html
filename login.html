<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTN Portal</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#ffcc00;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:340px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#222;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#ffcc00;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#f4b400;
}

p{
    font-size:14px;
}
</style>

</head>

<body>

<div class="login-box">

<img src="MTN.JPG" class="logo" alt="MTN Logo">

<h2>MTN Portal Login</h2>

<form action="success.html">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Need help? Call <b>+234 913 699 5191</b></p>

</div>

</body>
</html>
